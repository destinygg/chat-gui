<div id="chat" class="chat">
  <div id="chat-windows-select"></div>

  <div id="chat-event-bar"></div>

  <div id="chat-poll-frame">
    <div class="poll-frame">
      <div class="toolbar">
        <h5>
          <span>Poll</span>
          <i class="poll-close chat-menu-close" title="Close poll"></i>
        </h5>
      </div>
      <div class="poll-header">
        <div class="poll-top">
          <span class="poll-question"></span>
        </div>
        <div class="poll-title">
          <span class="poll-info"></span>
          <span class="poll-votes"></span>
        </div>
      </div>
      <div class="poll-options"></div>
      <div class="poll-footer">
        <div class="poll-timer">
          <div class="poll-timer-inner"></div>
        </div>
        <span class="poll-end"></span>
      </div>
    </div>
  </div>

  <div id="chat-output-frame" data-scroll-notify>
    <div id="chat-event-selected" class="hidden"></div>
    <div id="chat-pinned-message"></div>
  </div>

  <div id="chat-input-frame">
    <div id="chat-format-bar">
      <button class="fmt-btn" id="fmt-color" title="Font Color"><img /></button>
      <button class="fmt-btn" id="fmt-bgcolor" title="Background Color">
        <img />
      </button>
      <span class="fmt-divider"></span>
      <button class="fmt-btn" id="fmt-size-dec" title="Decrease Size">
        <img />
      </button>
      <button class="fmt-btn" id="fmt-size-def" title="Default Size">
        <img />
      </button>
      <button class="fmt-btn" id="fmt-size-inc" title="Increase Size">
        <img />
      </button>
      <span class="fmt-divider"></span>
      <button class="fmt-btn" id="fmt-bold" title="Bold"><img /></button>
      <button class="fmt-btn" id="fmt-italic" title="Italic"><img /></button>
      <button class="fmt-btn" id="fmt-underline" title="Underline">
        <img />
      </button>
      <span class="fmt-divider"></span>
      <button class="fmt-btn" id="fmt-link" title="Link" disabled>
        <img />
      </button>
      <button class="fmt-btn" id="fmt-image" title="Image" disabled>
        <img />
      </button>
      <button class="fmt-btn" id="fmt-smiley" title="Smiley"><img /></button>
    </div>
    <div id="chat-color-picker-overlay" style="display: none"></div>
    <div id="chat-input-wrap">
      <textarea
        enterkeyhint="send"
        id="chat-input-control"
        placeholder="Getting things ready ..."
        autocomplete="off"
        tabindex="1"
        autofocus
        spellcheck
      ></textarea>
      <div id="chat-send-wrap">
        <button id="chat-send-btn" type="button">
          <i class="send-icon"></i>
        </button>
        <div class="send-progress-bar">
          <i></i><i></i><i class="y"></i><i class="y"></i><i class="y"></i
          ><i class="y"></i><i class="y"></i><i class="y"></i><i class="y"></i
          ><i class="g"></i><i class="g"></i><i class="g"></i><i class="g"></i
          ><i class="g"></i><i class="g"></i>
        </div>
      </div>
      <a id="chat-input-subonly" class="chat-tool-btn" title="Subonly mode">
        <i class="btn-icon"></i>
      </a>
    </div>
    <div id="chat-tools-wrap">
      <div class="chat-tools-group">
        <a id="chat-emoticon-btn" class="chat-tool-btn">
          <i class="btn-icon"></i>
        </a>
        <a id="chat-whisper-btn" class="chat-tool-btn">
          <i class="btn-icon"></i>
        </a>
      </div>
      <div class="chat-tools-group">
        <a id="chat-settings-btn" class="chat-tool-btn">
          <i class="btn-icon"></i>
        </a>
        <a id="chat-users-btn" class="chat-tool-btn">
          <i class="btn-icon"></i>
        </a>
      </div>
    </div>
  </div>

  <div id="chat-settings" class="chat-menu right">
    <div class="chat-menu-inner">
      <div class="toolbar">
        <h5><span>Settings</span> <i class="chat-menu-close"></i></h5>
      </div>
      <div class="scrollable">
        <div class="content">
          <div id="chat-settings-form">
            <div class="form-group checkbox">
              <label title="Persistent profile settings">
                <input name="profilesettings" type="checkbox" /> Save settings
                to profile
              </label>
            </div>

            <div class="form-group">
              <label for="fontscale">Font Scaling</label>
              <select class="form-control" id="fontscale" name="fontscale">
                <option value="auto">Auto Scale</option>
                <option value="none">No Scale</option>
                <option value="small">Size Small</option>
                <option value="medium">Size Medium</option>
                <option value="large">Size Large</option>
              </select>
              <span class="win95-select-btn"></span>
            </div>

            <h4>Messages</h4>
            <div class="form-group checkbox">
              <label title="Show the timestamps next to the messages">
                <input name="showtime" type="checkbox" /> Show time
              </label>
            </div>
            <div class="form-group checkbox">
              <label title="Ignore messages that mention ignored users">
                <input name="ignorementions" type="checkbox" /> Harsh ignore
              </label>
            </div>
            <div class="form-group checkbox">
              <label title="Show entire url in message">
                <input name="showentireurl" type="checkbox" /> Show entire URL
              </label>
            </div>
            <div class="form-group checkbox">
              <label
                title="Hide messages that contain links to not safe for work content"
              >
                <input name="hidensfw" type="checkbox" /> Hide messages with
                nsfw
              </label>
            </div>
            <div class="form-group checkbox">
              <label
                title="Hide messages that contain links to not safe for life content"
              >
                <input name="hidensfl" type="checkbox" /> Hide messages with
                nsfl
              </label>
            </div>
            <div class="form-group checkbox">
              <label
                title="Replace bad words with asterisks (e.g., the F word becomes ****)"
              >
                <input name="censorbadwords" type="checkbox" /> Censor bad words
              </label>
            </div>
            <div class="form-group">
              <label for="showremoved">Banned messages</label>
              <select class="form-control" id="showremoved" name="showremoved">
                <option value="0">remove</option>
                <option value="1">&lt;censored&gt;</option>
                <option value="2">do nothing</option>
              </select>
              <span class="win95-select-btn"></span>
            </div>
            <div class="form-group checkbox">
              <label title="Disable animations when possible">
                <input name="disableanimations" type="checkbox" /> Disable
                animations when possible
              </label>
            </div>

            <h4>Notifications</h4>
            <div class="form-group checkbox">
              <label title="Notification auto close">
                <input name="notificationtimeout" type="checkbox" /> Close after
                short period
              </label>
            </div>

            <h4>Sounds</h4>
            <div class="form-group checkbox">
              <label title="Play sound when sending a message">
                <input
                  name="soundSent"
                  type="checkbox"
                  class="aim-sound-setting"
                />
                Sent message sound
              </label>
            </div>
            <div class="form-group checkbox">
              <label title="Play sound when receiving a message">
                <input
                  name="soundReceived"
                  type="checkbox"
                  class="aim-sound-setting"
                />
                Received message sound
              </label>
            </div>

            <h4>Whispers</h4>
            <div class="form-group checkbox">
              <label title="Notification on whisper">
                <input name="notificationwhisper" type="checkbox" />
                Notification
              </label>
            </div>
            <div class="form-group checkbox">
              <label title="Whispers shown in chat">
                <input name="showhispersinchat" type="checkbox" /> In-line
                messages
              </label>
            </div>

            <h4>Highlights, Focus &amp; Tags</h4>
            <div class="form-group checkbox">
              <label title="Notification on highlight">
                <input name="notificationhighlight" type="checkbox" />
                Notification
              </label>
            </div>
            <div class="form-group checkbox">
              <label title="Highlights messages you are mentioned in">
                <input name="highlight" type="checkbox" /> Highlight when
                mentioned
              </label>
            </div>
            <div class="form-group checkbox">
              <label title="Include mentions when focused">
                <input name="focusmentioned" type="checkbox" /> Include mentions
                when
                <span title="Occurs when you click on a user in chat."
                  >focused</span
                >
              </label>
            </div>
            <div class="form-group checkbox">
              <label>
                <input name="taggedvisibility" type="checkbox" /> Increased
                visibility of tagged users
              </label>
            </div>
            <div class="form-group row">
              <label title="Highlights usernames or text that match"
                >Custom Highlights</label
              >
              <textarea
                name="customhighlight"
                style="resize: vertical"
                class="form-control"
                placeholder="Comma separated ..."
              ></textarea>
            </div>

            <h4>Autocomplete</h4>
            <div class="form-group checkbox">
              <label title="Toggle the auto-complete suggestion tabs ...">
                <input name="autocompletehelper" type="checkbox" />
                Auto-complete helper
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="chat-user-list" class="chat-menu right">
    <div class="chat-menu-inner">
      <div class="toolbar">
        <h5><span>People</span> <i class="chat-menu-close"></i></h5>
      </div>
      <div class="scrollable">
        <div class="content"></div>
      </div>
      <div id="chat-user-list-search">
        <label for="user-search-input">Username Search:</label>
        <input
          type="text"
          id="user-search-input"
          class="form-control"
          value=""
        />
      </div>
    </div>
  </div>

  <div id="chat-user-info" class="chat-menu">
    <div class="chat-menu-inner floating-window">
      <div class="toolbar">
        <h5><span>User Info</span> <i class="chat-menu-close"></i></h5>
      </div>
      <div class="user-info">
        <h5 class="watching-subheader">Watching:</h5>
        <h5 class="date-subheader"></h5>
        <h5 class="tag-subheader"></h5>
        <h5>Messages:</h5>
        <div class="stalk">
          <div class="scrollable">
            <div class="content">
              <div class="message-history-status hidden">
                Loading history...
              </div>
              <div class="no-messages-notice hidden">No messages</div>
              <div class="messages"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="chat-emote-tooltip" class="chat-menu">
    <div class="chat-menu-inner floating-window">
      <div class="emote-image"></div>
      <div class="emote-info">
        <div class="name" title="Emote name"></div>
        <div class="creator" title="Emote creator"></div>
        <button class="favorite" title="Favorite emote">
          <i class="btn-icon"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="chat-emote-list" class="chat-menu left">
    <div class="chat-menu-inner">
      <div class="toolbar">
        <h5><span>Smileys</span> <i class="chat-menu-close"></i></h5>
      </div>
      <div class="scrollable all">
        <div class="content"></div>
      </div>
      <div id="chat-emote-list-search">
        <label for="emote-search-input">Emote Search:</label>
        <input
          type="text"
          id="emote-search-input"
          class="form-control"
          value=""
        />
      </div>
    </div>
  </div>

  <div id="chat-whisper-users" class="chat-menu left">
    <div class="chat-menu-inner">
      <div class="toolbar">
        <h5><span>Buddy List</span> <i class="chat-menu-close"></i></h5>
      </div>
      <div class="scrollable">
        <div class="content">
          <ul></ul>
        </div>
      </div>
    </div>
  </div>

  <div id="chat-login-screen" style="display: none">
    <div class="login-window">
      <div class="toolbar">
        <h5><span>Sign On</span></h5>
      </div>
      <div class="login-body">
        <div class="login-logo"></div>
        <p class="login-message">You need to be signed in to chat.</p>
        <div class="login-buttons">
          <button id="chat-btn-login" class="btn">Sign On</button>
          <button id="chat-btn-cancel" class="btn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <div id="chat-loading">
    <div>
      <i class="chat-loading-icon"></i>
    </div>
  </div>

  <div id="event-action-menu" class="chat-menu">
    <div class="chat-menu-inner floating-window">
      <button id="remove-event-button" class="event-action">
        Remove Event
      </button>
    </div>
  </div>
</div>
